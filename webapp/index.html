<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CNN POS Tagger</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; }
        #results { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .token { border: 1px solid #ddd; padding: 5px 10px; border-radius: 4px; background: #f9f9f9; }
        .tag { display: block; font-size: 0.75rem; color: #666; font-weight: bold; border-top: 1px solid #eee; margin-top: 4px; }
        #status { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Part-of-Speech Tagger</h1>
    <p id="status">Loading Model (may take a moment)...</p>
    
    <textarea id="input-text" placeholder="Type a sentence here..."></textarea>
    <button id="tag-btn" disabled>Tag Speech</button>

    <div id="results"></div>

    <script src="main.js"></script>
</body>
</html>
